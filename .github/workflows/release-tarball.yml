name: Release Lean Tarball

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get changed files
        id: files
        run: |
          # Collect all files tracked in git
          mapfile -t ALL_FILES < <(git ls-tree -r --name-only HEAD)

          LEAN_FILES=()
          for f in "${ALL_FILES[@]}"; do
            # Exclude scripts/ (CI tooling) and lakefiles/, test/, doc/
            if [[ "$f" == scripts/* ]] || [[ "$f" == lakefiles/* ]] || \
               [[ "$f" == test/* ]] || [[ "$f" == doc/* ]]; then
              continue
            fi

            # Include: .lean files, lakefile.toml, lean-toolchain
            # (QuadraticNumberFields/ already covers all library .lean files)
            if [[ "$f" == *.lean ]] || \
               [[ "$f" == "lakefile.toml" ]] || \
               [[ "$f" == "lean-toolchain" ]]; then
              LEAN_FILES+=("$f")
            fi
          done

          # Print for debugging
          echo "Lean files to include: ${#LEAN_FILES[@]}"
          for f in "${LEAN_FILES[@]}"; do echo "  $f"; done

          # Create tarball from repo root (no extra prefix needed;
          # git ls-tree already gives paths like QuadraticNumberFields/X.lean)
          tar -czf quadratic-number-fields.tar.gz \
            "${LEAN_FILES[@]}"

          echo "tarball created"
          ls -lh quadratic-number-fields.tar.gz

          # Output for upload step
          echo "file_count=${#LEAN_FILES[@]}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: quadratic-number-fields.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
