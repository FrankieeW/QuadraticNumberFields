name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev pkg-config

      - name: Install Elan
        run: |
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Build Lean package
        working-directory: Lean
        run: |
          lake exe cache get
          lake build

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: site

      - name: Generate source-driven API atlas
        run: bash scripts/build_docs.sh

      - name: Build Jekyll
        run: bundle exec jekyll build --destination ../_site --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: site
        env:
          JEKYLL_ENV: production

      - name: Build blueprint
        run: bash scripts/build_blueprint.sh

      - name: Stage blueprint into Pages artifact
        run: |
          mkdir -p _site/blueprint
          if [ -d blueprint/web ] && [ "$(find blueprint/web -type f | wc -l)" -gt 0 ]; then
            cp -R blueprint/web/. _site/blueprint/
          elif [ -d blueprint/src/web ] && [ "$(find blueprint/src/web -type f | wc -l)" -gt 0 ]; then
            cp -R blueprint/src/web/. _site/blueprint/
          else
            echo "No non-empty blueprint site directory found."
            find blueprint -maxdepth 4 -type f | sed -n '1,200p'
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
